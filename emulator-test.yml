name: Build APK & Test on Emulator

on:
  push:
    branches: [ main, emulator-test ]
  workflow_dispatch:
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      
      - name: Build debug APK
        run: ./gradlew assembleDebug
      
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
      
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Create emulator
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "system-images;android-34;google_apis;x86_64"
          echo "no" | $ANDROID_HOME/cmdline-tools/latest/bin/avdmanager create avd \
            -n test34 \
            -k "system-images;android-34;google_apis;x86_64" \
            -d pixel_5 \
            --force
      
      - name: Start emulator
        run: |
          $ANDROID_HOME/emulator/emulator -avd test34 \
            -gpu swiftshader_indirect \
            -no-snapshot \
            -no-boot-anim \
            -memory 2048 \
            -cores 4 &
          
          adb wait-for-device
          while [ "$(adb shell getprop sys.boot_completed | tr -d '\r')" != 1 ]; do 
            sleep 3
          done
      
      - name: Install and launch app
        run: |
          export PATH=$PATH:$ANDROID_HOME/platform-tools
          adb install -r app/build/outputs/apk/debug/app-debug.apk
          adb shell monkey -p com.vapesmadcat.monitorbatt -c android.intent.category.LAUNCHER 1
          sleep 3
      
      - name: Capture screenshot
        run: |
          export PATH=$PATH:$ANDROID_HOME/platform-tools
          adb exec-out screencap -p > /tmp/emulator-screenshot.png
      
      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: emulator-screenshot
          path: /tmp/emulator-screenshot.png
