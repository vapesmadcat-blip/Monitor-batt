<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monitor de Bateria</title>
    <style>
        /* Tela Cheia e Fundo Escuro */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0a0a0a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            color: white;
        }

        /* Moldura da Bateria */
        .bateria-corpo {
            width: 130px;
            height: 240px;
            border: 5px solid #333;
            border-radius: 20px;
            position: relative;
            background: #111;
            padding: 5px;
        }

        /* Pino da Bateria */
        .bateria-corpo::before {
            content: '';
            position: absolute;
            top: -16px;
            left: 50%;
            transform: translateX(-50%);
            width: 45px;
            height: 12px;
            background: #333;
            border-radius: 5px 5px 0 0;
        }

        /* Barra de Carga */
        .nivel-preenchimento {
            width: 100%;
            height: 0%; /* JS atualiza */
            position: absolute;
            bottom: 0;
            left: 0;
            border-radius: 14px;
            transition: height 1s ease-in-out, background-color 0.5s;
        }

        /* Texto */
        #texto-porcentagem {
            font-size: 4rem;
            font-weight: bold;
            margin-top: 25px;
        }

        #status-carregando {
            margin-top: 10px;
            font-size: 1rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="bateria-corpo">
        <div id="barra-carga" class="nivel-preenchimento"></div>
    </div>
    
    <div id="texto-porcentagem">--%</div>
    <div id="status-carregando">Sincronizando...</div>

    <script>
        const barraCarga = document.getElementById('barra-carga');
        const textoPorcentagem = document.getElementById('texto-porcentagem');
        const statusCarregando = document.getElementById('status-carregando');

        function atualizarInterfaceBateria(battery) {
            const nivel = Math.round(battery.level * 100);
            
            textoPorcentagem.textContent = nivel + "%";
            barraCarga.style.height = nivel + "%";

            // Cores automáticas
            if (nivel <= 20) {
                barraCarga.style.backgroundColor = "#ff4d4d"; // Vermelho
            } else if (nivel <= 50) {
                barraCarga.style.backgroundColor = "#ffd11a"; // Amarelo
            } else {
                barraCarga.style.backgroundColor = "#2ecc71"; // Verde
            }

            statusCarregando.textContent = battery.charging ? "⚡ Carregando..." : "🔋 Bateria";
        }

        // Execução imediata como na primeira versão que funcionou
        if ('getBattery' in navigator) {
            navigator.getBattery().then(battery => {
                atualizarInterfaceBateria(battery);
                battery.addEventListener('levelchange', () => atualizarInterfaceBateria(battery));
                battery.addEventListener('chargingchange', () => atualizarInterfaceBateria(battery));
            });
        } else {
            textoPorcentagem.textContent = "Erro";
            statusCarregando.textContent = "Navegador não suportado";
        }
    </script>
</body>
</html>
